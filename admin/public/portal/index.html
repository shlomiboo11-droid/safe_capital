<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>העסקאות שלי | Safe Capital</title>
  <link rel="icon" type="image/png" href="/portal/images/logo-half.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/portal/css/portal.css" rel="stylesheet">
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { headline: ['Heebo'], body: ['Heebo'], label: ['Inter'] },
            colors: {
              primary: '#022445',
              'primary-container': '#1e3a5c',
              secondary: '#984349',
              background: '#fbf9f6',
              'surface-container-low': '#f5f3f0',
              'on-surface-variant': '#43474e',
            }
          }
        }
      };
    }
  </script>
</head>
<body class="min-h-screen" style="background: #fbf9f6;">
  <header id="portalHeader"></header>

  <main id="mainContent" class="max-w-5xl mx-auto px-4 py-6" style="padding-top: 80px; padding-bottom: 100px;">
    <!-- Loading state -->
    <div id="loadingState" class="flex items-center justify-center py-20">
      <svg class="animate-spin h-8 w-8" style="color: #022445;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>

    <!-- Dashboard content (injected by JS) -->
    <div id="dashboardContent" class="hidden"></div>
  </main>

  <footer id="portalFooter"></footer>
  <nav id="portalBottomNav"></nav>

  <script src="/portal/js/auth.js"></script>
  <script src="/portal/js/shared.js"></script>
  <script>
    const investor = requirePortalAuth();
    if (investor) {
      initPortalShell('home');
      loadDashboard();
    }

    const STATUS_MAP = {
      sourcing:   { label: 'בחיפוש',  badge: 'badge-gray' },
      purchased:  { label: 'נרכש',    badge: 'badge-blue' },
      planning:   { label: 'בתכנון',  badge: 'badge-lightblue' },
      renovation: { label: 'בשיפוץ',  badge: 'badge-orange' },
      selling:    { label: 'למכירה',  badge: 'badge-purple' },
      sold:       { label: 'נמכר',    badge: 'badge-green' }
    };

    function formatCurrency(num) {
      if (!num && num !== 0) return '$0';
      return '$' + Number(num).toLocaleString('en-US');
    }

    async function loadDashboard() {
      const loading = document.getElementById('loadingState');
      const content = document.getElementById('dashboardContent');

      try {
        const data = await PORTAL_API.get('/my-deals');
        loading.classList.add('hidden');
        content.classList.remove('hidden');
        renderDashboard(data);
      } catch (err) {
        loading.classList.add('hidden');
        content.classList.remove('hidden');
        content.innerHTML = `
          <div class="text-center py-16">
            <span class="material-symbols-outlined text-5xl mb-4 block" style="color: #d1d5db;">error</span>
            <p class="text-lg font-semibold" style="color: #1b1c1a;">שגיאה בטעינת הנתונים</p>
            <p class="text-sm mt-2" style="color: #43474e;">${(err.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 rounded-lg text-sm font-semibold text-white" style="background: #022445;">
              נסה שוב
            </button>
          </div>
        `;
      }
    }

    function renderDashboard(data) {
      const content = document.getElementById('dashboardContent');
      const summary = data.summary || {};
      const deals = data.deals || [];
      const investorData = PORTAL_API.getInvestor();
      const firstName = investorData ? (investorData.name || investorData.username || '').split(' ')[0] : '';

      // Flatten deal data: API returns { amount, deal: { id, name, ... } }
      const flatDeals = deals.map(d => ({
        id: d.deal ? d.deal.id : d.id,
        name: d.deal ? d.deal.name : d.name,
        address: d.deal ? (d.deal.full_address || d.deal.city) : d.address,
        status: d.deal ? d.deal.property_status : d.status,
        thumbnail: d.deal ? (d.deal.thumbnail ? d.deal.thumbnail.image_url : d.deal.thumbnail_url) : d.thumbnail,
        investment_amount: d.amount || 0,
        progress: d.deal && d.deal.timeline_steps ? Math.round(d.deal.timeline_steps.filter(s => s.status === 'completed').length / d.deal.timeline_steps.length * 100) : 0
      }));

      // Sort: active first, sold at bottom
      flatDeals.sort((a, b) => {
        if (a.status === 'sold' && b.status !== 'sold') return 1;
        if (a.status !== 'sold' && b.status === 'sold') return -1;
        return 0;
      });

      let html = '';

      // A. Greeting
      html += `
        <h1 class="text-2xl font-bold mb-6" style="color: #022445; font-family: 'Heebo', sans-serif;">
          שלום${firstName ? ' ' + firstName : ''}
        </h1>
      `;

      // B. Notification banner
      const unreadBadges = document.querySelectorAll('.notification-badge:not(.hidden)');
      const unreadCount = unreadBadges.length > 0 ? parseInt(unreadBadges[0].textContent) || 0 : 0;
      if (unreadCount > 0) {
        html += `
          <a href="/portal/notifications.html" class="block mb-6 p-4 rounded-xl" style="background: #fff7ed;">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined" style="color: #9a3412;">notifications_active</span>
              <span class="font-semibold" style="color: #9a3412;">יש לך ${unreadCount} עדכונים חדשים</span>
              <span class="material-symbols-outlined mr-auto text-sm" style="color: #9a3412;">arrow_back</span>
            </div>
          </a>
        `;
      }

      // C. Portfolio summary
      html += `
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
          <div class="metric-card">
            <div class="metric-num">${formatCurrency(summary.total_invested)}</div>
            <div class="metric-label">סה"כ השקעות</div>
          </div>
          <div class="metric-card">
            <div class="metric-num" style="font-size: ${window.innerWidth < 768 ? '1.5rem' : '2rem'};">${summary.active_deals || 0}</div>
            <div class="metric-label">עסקאות פעילות</div>
          </div>
          <div class="metric-card">
            <div class="metric-num" style="font-size: ${window.innerWidth < 768 ? '1.5rem' : '2rem'};">${summary.completed_deals || 0}</div>
            <div class="metric-label">עסקאות שהושלמו</div>
          </div>
          <div class="metric-card">
            <div class="metric-num">${formatCurrency(summary.total_profit)}</div>
            <div class="metric-label">רווח שהתקבל</div>
          </div>
        </div>
      `;

      // D. Deal cards
      if (flatDeals.length === 0) {
        // E. Empty state
        html += `
          <div class="text-center py-16">
            <span class="material-symbols-outlined text-5xl mb-4 block" style="color: #d1d5db;">real_estate_agent</span>
            <p class="text-lg font-semibold" style="color: #1b1c1a;">עדיין אין עסקאות פעילות</p>
            <p class="text-sm mt-2" style="color: #43474e;">צוות סייף קפיטל יעדכן אותך כשתצורף לעסקה חדשה.</p>
          </div>
        `;
      } else {
        html += `<h2 class="text-lg font-bold mb-4" style="color: #022445;">העסקאות שלי</h2>`;
        html += `<div class="space-y-4">`;

        flatDeals.forEach(deal => {
          const status = STATUS_MAP[deal.status] || STATUS_MAP.sourcing;
          const thumbnail = deal.thumbnail || '';
          const progress = deal.progress || 0;
          const investmentAmount = deal.investment_amount || 0;

          html += `
            <a href="/portal/deal.html?id=${deal.id || deal._id}" class="deal-card block">
              <div class="flex flex-col sm:flex-row">
                ${thumbnail ? `
                  <div class="sm:w-48 h-40 sm:h-auto flex-shrink-0">
                    <img src="${thumbnail}" alt="${deal.name || ''}" class="w-full h-full object-cover">
                  </div>
                ` : `
                  <div class="sm:w-48 h-40 sm:h-auto flex-shrink-0 flex items-center justify-center" style="background: #f5f3f0;">
                    <span class="material-symbols-outlined text-4xl" style="color: #d1d5db;">home</span>
                  </div>
                `}
                <div class="flex-1 p-4 sm:p-5">
                  <div class="flex items-start justify-between gap-2 mb-2">
                    <h3 class="font-semibold text-base" style="color: #1b1c1a; font-family: 'Heebo', sans-serif;">${deal.name || 'עסקה'}</h3>
                    <span class="badge ${status.badge} flex-shrink-0">${status.label}</span>
                  </div>
                  ${deal.address ? `<p class="text-sm mb-3" style="color: #74777f;">${deal.address}</p>` : ''}
                  <p class="text-sm mb-3" style="color: #43474e;">
                    ההשקעה שלי:
                    <span style="font-family: 'Inter', sans-serif; font-weight: 700; color: #984349;">${formatCurrency(investmentAmount)}</span>
                  </p>
                  <div class="progress-track mb-3">
                    <div class="progress-fill" style="width: ${progress}%;"></div>
                  </div>
                  <div class="flex items-center gap-1 text-sm font-semibold" style="color: #022445;">
                    <span>צפה בפרטים</span>
                    <span class="material-symbols-outlined text-base">arrow_back</span>
                  </div>
                </div>
              </div>
            </a>
          `;
        });

        html += `</div>`;
      }

      content.innerHTML = html;
    }
  </script>
</body>
</html>
