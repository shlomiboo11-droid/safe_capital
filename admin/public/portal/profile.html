<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הפרופיל שלי | Safe Capital</title>
  <link rel="icon" type="image/png" href="/images/logo-half.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/css/portal.css" rel="stylesheet">
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              headline: ['Heebo', 'Plus Jakarta Sans', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
              label: ['Inter', 'sans-serif']
            },
            colors: {
              primary: '#000e21',
              'primary-container': '#022445',
              secondary: '#984349',
              'secondary-fixed': '#ffdada',
              'on-secondary-container': '#792b32',
              background: '#fbf9f6',
              surface: '#fbf9f6',
              'surface-container-low': '#f5f3f0',
              'surface-container': '#efeeeb',
              'surface-container-high': '#eae8e5',
              'surface-container-highest': '#e4e2df',
              'surface-container-lowest': '#ffffff',
              'on-surface': '#1b1c1a',
              'on-surface-variant': '#43474e',
              outline: '#74777f',
              'outline-variant': '#c4c6cf',
            }
          }
        }
      };
    }
  </script>
</head>
<body class="min-h-screen" style="background: #fbf9f6;">
  <header id="portalHeader"></header>

  <main id="mainContent" class="max-w-3xl mx-auto px-4 py-6" style="padding-top: 80px; padding-bottom: 100px;">
    <div id="loadingState" class="flex items-center justify-center py-20">
      <svg class="animate-spin h-8 w-8" style="color: #000e21;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
    <div id="profileContent" class="hidden"></div>
  </main>

  <footer id="portalFooter"></footer>
  <nav id="portalBottomNav"></nav>

  <script src="/js/auth.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
