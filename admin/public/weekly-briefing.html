<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סקירה שבועית | Safe Capital Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/tailwind-utilities.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body class="bg-surface min-h-screen font-heebo">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="p-6 border-b border-white/10">
      <a href="/" class="block">
        <img src="/images/logo-half.png" alt="Safe Capital" class="h-8" style="filter: brightness(0) invert(1);" onerror="this.style.display='none'">
      </a>
      <p class="text-xs text-white/50 mt-1">דאשבורד ניהול</p>
    </div>
    <nav class="p-3 space-y-1 mt-2">
      <a href="/" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">dashboard</span>
        <span>עסקאות</span>
      </a>
      <a href="/investors" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">groups</span>
        <span>משקיעים</span>
      </a>
      <a href="/users" class="sidebar-link" id="nav-users" style="display: none;">
        <span class="material-symbols-outlined text-xl">group</span>
        <span>ניהול משתמשים</span>
      </a>
      <a href="/settings" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">settings</span>
        <span>הגדרות אתר</span>
      </a>

      <div class="sidebar-section-label">תוכן</div>
      <a href="/articles" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">article</span>
        <span>כתבות</span>
      </a>
      <a href="/weekly-briefing" class="sidebar-link active">
        <span class="material-symbols-outlined text-xl">summarize</span>
        <span>סקירה שבועית</span>
      </a>
      <a href="/content-pages" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">description</span>
        <span>עמודי מידע</span>
      </a>
      <a href="/content-agents" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">smart_toy</span>
        <span>פרומפטים</span>
      </a>
    </nav>
    <div class="absolute bottom-0 right-0 left-0 p-4 border-t border-white/10">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-medium" id="sidebar-username">--</div>
          <div class="text-xs text-white/50" id="sidebar-role">--</div>
        </div>
        <button onclick="API.logout()" class="text-white/50 hover:text-white transition" title="התנתק">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <button id="sidebarToggle" class="lg:hidden fixed top-4 right-4 z-50 bg-primary text-white p-2 rounded-lg shadow">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <!-- Main -->
  <main class="main-content">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">סקירה שבועית</h1>
        <p class="text-sm text-gray-500 mt-1" id="briefingCount"></p>
      </div>
      <button class="btn btn-primary" onclick="openBriefingModal()">
        <span class="material-symbols-outlined text-lg">add</span>
        סקירה חדשה
      </button>
    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="data-table" id="briefingsTable">
          <thead>
            <tr>
              <th>שבוע</th>
              <th>סטטוס</th>
              <th>תאריך יצירה</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="briefingsBody">
            <tr><td colspan="4" class="text-center py-12 text-gray-400">טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" style="display:none;" class="text-center py-20">
      <span class="material-symbols-outlined" style="font-size:60px;color:#d1d5db;">summarize</span>
      <h3 class="text-xl font-bold text-gray-400 mt-4">אין סקירות עדיין</h3>
      <p class="text-sm text-gray-400 mt-2">צור סקירה חדשה כדי להתחיל</p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // Auth guard
    if (!requireAuth()) throw new Error('redirect');
    (function() {
      const user = API.getUser();
      if (user) {
        document.getElementById('sidebar-username').textContent = user.full_name;
        document.getElementById('sidebar-role').textContent = user.role === 'super_admin' ? 'מנהל ראשי' : 'מנהל';
        if (user.role === 'super_admin') document.getElementById('nav-users').style.display = '';
      }
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebarToggle');
      if (toggle) toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    })();

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function loadBriefings() {
      try {
        const data = await API.get('/content/briefings');
        const briefings = data.briefings || [];
        document.getElementById('briefingCount').textContent = `${briefings.length} סקירות`;

        if (briefings.length === 0) {
          document.getElementById('briefingsTable').style.display = 'none';
          document.getElementById('emptyState').style.display = '';
          return;
        }

        document.getElementById('briefingsTable').style.display = '';
        document.getElementById('emptyState').style.display = 'none';
        renderTable(briefings);
      } catch (err) {
        document.getElementById('briefingsBody').innerHTML =
          '<tr><td colspan="4" class="text-center py-8 text-red-500">שגיאה בטעינה</td></tr>';
      }
    }

    function renderTable(briefings) {
      const tbody = document.getElementById('briefingsBody');
      tbody.innerHTML = briefings.map(b => {
        const weekDate = b.week_start ? new Date(b.week_start).toLocaleDateString('he-IL') : '--';
        const createdDate = b.created_at ? new Date(b.created_at).toLocaleDateString('he-IL') : '--';
        const published = b.is_published;

        return `<tr>
          <td class="font-medium font-inter" dir="ltr">${weekDate}</td>
          <td>
            <button class="badge badge-${published ? 'green' : 'gray'} cursor-pointer hover:opacity-80"
              onclick="togglePublish(${b.id}, ${!published})">
              ${published ? 'מפורסם' : 'טיוטה'}
            </button>
          </td>
          <td class="font-inter text-sm" dir="ltr">${createdDate}</td>
          <td>
            <div class="flex gap-1">
              <button class="btn btn-secondary btn-sm" title="עריכה" onclick="openBriefingModal(${b.id})">
                <span class="material-symbols-outlined text-sm">edit</span>
              </button>
              <button class="btn btn-secondary btn-sm" title="מחיקה" onclick="deleteBriefing(${b.id})">
                <span class="material-symbols-outlined text-sm">delete</span>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    async function togglePublish(id, newVal) {
      try {
        await API.put(`/content/briefings/${id}`, { is_published: newVal });
        loadBriefings();
      } catch (err) {
        showToast(err.message || 'שגיאה בעדכון', 'error');
      }
    }

    async function deleteBriefing(id) {
      const confirmed = await confirmAction('האם למחוק את הסקירה? פעולה זו בלתי הפיכה.');
      if (!confirmed) return;
      try {
        await API.delete(`/content/briefings/${id}`);
        showToast('הסקירה נמחקה');
        loadBriefings();
      } catch (err) {
        showToast(err.message || 'שגיאה במחיקה', 'error');
      }
    }

    async function openBriefingModal(briefingId) {
      let briefing = null;
      if (briefingId) {
        try {
          const data = await API.get(`/content/briefings/${briefingId}`);
          briefing = data.briefing;
        } catch { return; }
      }

      const isEdit = !!briefing;
      const title = isEdit ? 'עריכת סקירה' : 'סקירה חדשה';

      const overlay = document.createElement('div');
      overlay.className = 'branded-modal-overlay';
      overlay.innerHTML = `
        <div class="branded-modal" style="max-width: 48rem; max-height: 90vh; overflow-y: auto;">
          <h3 class="branded-modal-title">${title}</h3>
          <form id="briefingForm" class="space-y-4">
            <div>
              <label class="form-label">שבוע (תאריך התחלה) *</label>
              <input type="date" name="week_start" class="form-input ltr" dir="ltr" required value="${briefing?.week_start ? briefing.week_start.substring(0, 10) : ''}">
            </div>
            <div>
              <label class="form-label">תוכן *</label>
              <textarea name="body" class="form-input" style="min-height:300px;" required placeholder="תוכן הסקירה השבועית">${escapeHtml(briefing?.body || '')}</textarea>
            </div>
            <div>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="is_published" class="w-5 h-5" ${briefing?.is_published ? 'checked' : ''}>
                <span class="text-sm font-medium">מפורסם</span>
              </label>
            </div>
            <div class="branded-modal-actions" style="margin-top: 1.5rem;">
              <button type="submit" class="branded-modal-btn branded-modal-btn-primary">
                ${isEdit ? 'שמור שינויים' : 'צור סקירה'}
              </button>
              <button type="button" class="branded-modal-btn branded-modal-btn-secondary" data-action="cancel">
                ביטול
              </button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('[data-action="cancel"]').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      overlay.querySelector('#briefingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'שומר...';

        const payload = {
          week_start: form.elements.week_start.value,
          body: form.elements.body.value,
          is_published: form.elements.is_published.checked
        };

        try {
          if (isEdit) {
            await API.put(`/content/briefings/${briefingId}`, payload);
          } else {
            await API.post('/content/briefings', payload);
          }
          overlay.remove();
          showToast(isEdit ? 'הסקירה עודכנה' : 'הסקירה נוצרה');
          loadBriefings();
        } catch (err) {
          showToast(err.message || 'שגיאה בשמירה', 'error');
          btn.disabled = false;
          btn.textContent = isEdit ? 'שמור שינויים' : 'צור סקירה';
        }
      });

      requestAnimationFrame(() => overlay.querySelector('[name="week_start"]').focus());
    }

    // Init
    loadBriefings();
  </script>
</body>
</html>
