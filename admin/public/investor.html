<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרופיל משקיע | Safe Capital Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/tailwind-utilities.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body class="bg-surface min-h-screen font-heebo">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="p-6 border-b border-white/10">
      <a href="/" class="block">
        <img src="/images/logo-half.png" alt="Safe Capital" class="h-8" style="filter: brightness(0) invert(1);" onerror="this.style.display='none'">
      </a>
      <p class="text-xs text-white/50 mt-1">דאשבורד ניהול</p>
    </div>
    <nav class="p-3 space-y-1 mt-2">
      <a href="/" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">dashboard</span>
        <span>עסקאות</span>
      </a>
      <a href="/events" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">event</span>
        <span>ערב משקיעים</span>
      </a>
      <a href="/investors" class="sidebar-link active">
        <span class="material-symbols-outlined text-xl">groups</span>
        <span>משקיעים</span>
      </a>
      <a href="/users" class="sidebar-link" id="nav-users" style="display: none;">
        <span class="material-symbols-outlined text-xl">group</span>
        <span>ניהול משתמשים</span>
      </a>
      <a href="/settings" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">settings</span>
        <span>הגדרות אתר</span>
      </a>

      <div class="sidebar-section-label">תוכן</div>
      <a href="/articles" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">article</span>
        <span>כתבות</span>
      </a>
      <a href="/weekly-briefing" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">summarize</span>
        <span>סקירה שבועית</span>
      </a>
      <a href="/content-pages" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">description</span>
        <span>עמודי מידע</span>
      </a>
      <a href="/content-agents" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">smart_toy</span>
        <span>פרומפטים</span>
      </a>
    </nav>
    <div class="absolute bottom-0 right-0 left-0 p-4 border-t border-white/10">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-medium" id="sidebar-username">--</div>
          <div class="text-xs text-white/50" id="sidebar-role">--</div>
        </div>
        <button onclick="API.logout()" class="text-white/50 hover:text-white transition" title="התנתק">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <button id="sidebarToggle" class="lg:hidden fixed top-4 right-4 z-50 bg-primary text-white p-2 rounded-lg shadow">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <!-- Main -->
  <main class="main-content" id="mainContent">
    <div class="text-center py-12 text-gray-400">טוען...</div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // Auth guard
    if (!requireAuth()) throw new Error('redirect');
    (function() {
      const user = API.getUser();
      if (user) {
        document.getElementById('sidebar-username').textContent = user.full_name;
        document.getElementById('sidebar-role').textContent = user.role === 'super_admin' ? 'מנהל ראשי' : 'מנהל';
        if (user.role === 'super_admin') document.getElementById('nav-users').style.display = '';
      }
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebarToggle');
      if (toggle) toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    })();

    const STATUS_LABELS = { lead: 'ליד', active: 'פעיל', inactive: 'לא פעיל', vip: 'VIP' };
    const STATUS_COLORS = { lead: 'gray', active: 'green', inactive: 'yellow', vip: 'blue' };
    const SOURCE_LABELS = { conference: 'כנס', referral: 'הפניה', website: 'אתר', facebook: 'פייסבוק', linkedin: 'לינקדאין', whatsapp: 'ווצאפ', other: 'אחר' };
    const ID_TYPE_LABELS = { israeli_id: 'ת.ז.', passport: 'דרכון', other: 'אחר' };
    const PROPERTY_STATUS_LABELS = { sourcing: 'איתור', purchased: 'נרכש', planning: 'תכנון', renovation: 'שיפוץ', selling: 'מכירה', sold: 'נמכר' };
    const PROPERTY_STATUS_COLORS = { sourcing: 'gray', purchased: 'blue', planning: 'yellow', renovation: 'yellow', selling: 'blue', sold: 'green' };

    let investorId = null;
    let investorData = null;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatCurrency(val) {
      const n = parseFloat(val);
      if (!n && n !== 0) return '—';
      return '$' + Math.round(n).toLocaleString();
    }

    async function loadInvestor() {
      const params = new URLSearchParams(window.location.search);
      investorId = params.get('id');
      if (!investorId) {
        document.getElementById('mainContent').innerHTML = '<div class="text-center py-12 text-red-500">לא צוין מזהה משקיע</div>';
        return;
      }

      try {
        investorData = await API.get(`/investors/${investorId}`);
        renderProfile(investorData);
        populatePortalSection(investorData.investor);
      } catch (err) {
        document.getElementById('mainContent').innerHTML = '<div class="text-center py-12 text-red-500">שגיאה בטעינת פרופיל המשקיע</div>';
      }
    }

    function renderProfile(data) {
      const inv = data.investor;
      const deals = data.deals || [];
      const summary = data.summary || {};
      const name = `${inv.first_name} ${inv.last_name || ''}`.trim();
      const statusColor = STATUS_COLORS[inv.status] || 'gray';
      const statusLabel = STATUS_LABELS[inv.status] || inv.status;

      document.title = `${name} | Safe Capital Admin`;

      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <!-- Back + Header -->
        <div class="flex items-center gap-4 mb-6">
          <a href="/investors" class="text-gray-400 hover:text-primary transition" style="line-height:1;">
            <span class="material-symbols-outlined" style="font-size:28px;">arrow_forward</span>
          </a>
          <div class="flex-1">
            <div class="flex items-center gap-3 flex-wrap">
              <h1 class="text-2xl font-bold text-gray-900">${escapeHtml(name)}</h1>
              <span class="badge badge-${statusColor}">${statusLabel}</span>
            </div>
            <div class="flex items-center gap-4 mt-1 text-sm text-gray-500">
              ${inv.phone ? `<a href="tel:${inv.phone}" class="hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-sm">call</span><span class="font-inter" dir="ltr">${escapeHtml(inv.phone)}</span></a>` : ''}
              ${inv.email ? `<a href="mailto:${inv.email}" class="hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-sm">mail</span><span class="font-inter" dir="ltr">${escapeHtml(inv.email)}</span></a>` : ''}
            </div>
          </div>
          <div class="flex gap-2">
            ${inv.phone ? `<a href="https://wa.me/${inv.phone.replace(/[^0-9]/g, '')}" target="_blank" class="btn btn-secondary btn-sm" title="WhatsApp"><span class="material-symbols-outlined text-sm">chat</span> WhatsApp</a>` : ''}
            <button class="btn btn-primary btn-sm" onclick="openEditModal()">
              <span class="material-symbols-outlined text-sm">edit</span> עריכה
            </button>
          </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="card p-4">
            <div class="text-2xl font-bold font-inter text-primary">${summary.deal_count || 0}</div>
            <div class="text-sm text-gray-500 mt-1">עסקאות</div>
          </div>
          <div class="card p-4">
            <div class="text-2xl font-bold font-inter text-primary" dir="ltr">${formatCurrency(summary.total_invested)}</div>
            <div class="text-sm text-gray-500 mt-1">סה"כ השקעה</div>
          </div>
          <div class="card p-4">
            <div class="text-2xl font-bold font-inter ${summary.total_profit > 0 ? 'text-green-600' : 'text-gray-400'}" dir="ltr">${summary.total_profit ? formatCurrency(summary.total_profit) : '—'}</div>
            <div class="text-sm text-gray-500 mt-1">רווח מצטבר</div>
          </div>
          <div class="card p-4">
            <div class="text-2xl font-bold font-inter ${summary.avg_return > 0 ? 'text-green-600' : 'text-gray-400'}" dir="ltr">${summary.avg_return ? summary.avg_return.toFixed(1) + '%' : '—'}</div>
            <div class="text-sm text-gray-500 mt-1">תשואה ממוצעת</div>
          </div>
        </div>

        <!-- Portal Access Section -->
        <div class="card p-6 mb-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold">גישה לפורטל</h3>
            <div id="portalStatus"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="form-label">שם משתמש</label>
              <input type="text" id="portalUsername" class="form-input ltr text-sm" dir="ltr" placeholder="investor_username">
            </div>
            <div>
              <label class="form-label">סיסמה (מוצגת פעם אחת)</label>
              <div class="flex gap-2">
                <input type="text" id="portalPassword" class="form-input ltr text-sm flex-1" dir="ltr" placeholder="הגדר סיסמה ראשונית">
                <button class="btn btn-secondary btn-sm" onclick="generatePassword()" title="ייצר סיסמה">
                  <span class="material-symbols-outlined text-sm">password</span>
                </button>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <label class="form-label mb-0">פורטל פעיל</label>
              <input type="checkbox" id="portalActive" class="w-5 h-5">
            </div>
            <div id="lastLoginDisplay" class="text-sm text-gray-500"></div>
          </div>
          <div class="flex gap-2 mt-4">
            <button class="btn btn-primary btn-sm" onclick="savePortalAccess()">
              <span class="material-symbols-outlined text-sm">save</span>
              שמור גישה
            </button>
            <button class="btn btn-secondary btn-sm" onclick="resetPortalPassword()">
              <span class="material-symbols-outlined text-sm">lock_reset</span>
              אפס סיסמה
            </button>
          </div>
        </div>

        <!-- Deals Table -->
        <div class="card p-6 mb-6">
          <h3 class="text-lg font-bold mb-4">עסקאות</h3>
          ${deals.length === 0
            ? '<p class="text-gray-400 text-sm">המשקיע לא משויך לעסקאות</p>'
            : `<div class="overflow-x-auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>שם עסקה</th>
                    <th>סכום השקעה</th>
                    <th>אחוז בעלות</th>
                    <th>סטטוס עסקה</th>
                    <th>סטטוס השקעה</th>
                    <th>תאריך</th>
                  </tr>
                </thead>
                <tbody>
                  ${deals.map(d => {
                    const pStatus = PROPERTY_STATUS_LABELS[d.property_status] || d.property_status || '—';
                    const pColor = PROPERTY_STATUS_COLORS[d.property_status] || 'gray';
                    const invStatus = d.investment_status || 'funded';
                    const invStatusLabel = invStatus === 'funded' ? 'מומן' : invStatus === 'pending' ? 'ממתין' : invStatus;
                    return `<tr>
                      <td><a href="/deal?id=${d.deal_id}" class="font-medium text-primary hover:underline">${escapeHtml(d.deal_name)}</a></td>
                      <td class="font-inter" dir="ltr">${formatCurrency(d.amount)}</td>
                      <td class="font-inter" dir="ltr">${d.ownership_percentage ? d.ownership_percentage + '%' : '—'}</td>
                      <td><span class="badge badge-${pColor}">${pStatus}</span></td>
                      <td><span class="badge badge-${invStatus === 'funded' ? 'green' : 'yellow'}">${invStatusLabel}</span></td>
                      <td class="font-inter" dir="ltr">${d.investment_date || '—'}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>`
          }
        </div>

        <!-- Full Details -->
        <div class="card p-6">
          <h3 class="text-lg font-bold mb-4">פרטים מלאים</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- Identification -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">זיהוי</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('סוג תעודה', ID_TYPE_LABELS[inv.id_type] || inv.id_type)}
                ${detailRow('מספר תעודה', inv.id_number, true)}
              </div>
            </div>

            <!-- Address -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">כתובת</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('כתובת', inv.address)}
                ${detailRow('עיר', inv.city)}
                ${detailRow('מדינה', inv.country)}
              </div>
            </div>

            <!-- Banking -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">פרטים בנקאיים</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('בנק', inv.bank_name)}
                ${detailRow('סניף', inv.bank_branch)}
                ${detailRow('חשבון', inv.bank_account, true)}
              </div>
            </div>

            <!-- Company -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">חברה</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('שם חברה', inv.company_name)}
                ${detailRow('ח.פ', inv.company_number, true)}
              </div>
            </div>

            <!-- LLC -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">LLC</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('שם LLC', inv.llc_name, true)}
                ${detailRow('EIN', inv.llc_ein, true)}
                ${detailRow('ITIN', inv.us_tax_id, true)}
              </div>
            </div>

            <!-- Management -->
            <div>
              <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">ניהול</h4>
              <div class="space-y-2 text-sm">
                ${detailRow('מקור הגעה', inv.source ? (SOURCE_LABELS[inv.source] || inv.source) : null)}
                ${detailRow('הערות', inv.notes)}
                ${detailRow('נוצר בתאריך', inv.created_at ? new Date(inv.created_at).toLocaleDateString('he-IL') : null)}
              </div>
            </div>

          </div>
        </div>
      `;
    }

    function detailRow(label, value, ltr) {
      const display = value || '<span class="text-gray-300">—</span>';
      return `<div class="flex justify-between py-1 border-b border-gray-100">
        <span class="text-gray-500">${label}</span>
        <span class="font-medium ${ltr ? 'font-inter" dir="ltr' : '"'}">${escapeHtml(String(value || ''))||'<span class="text-gray-300">—</span>'}</span>
      </div>`;
    }

    // ── Edit Modal (reuse same pattern as investors.html) ──
    async function openEditModal() {
      const inv = investorData.investor;

      const overlay = document.createElement('div');
      overlay.className = 'branded-modal-overlay';
      overlay.innerHTML = `
        <div class="branded-modal" style="max-width: 40rem; max-height: 90vh; overflow-y: auto;">
          <h3 class="branded-modal-title">עריכת משקיע</h3>
          <form id="investorEditForm" class="space-y-5">

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">פרטים אישיים</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">שם פרטי *</label>
                <input type="text" name="first_name" class="form-input text-sm" required value="${escapeHtml(inv.first_name || '')}">
              </div>
              <div>
                <label class="form-label">שם משפחה</label>
                <input type="text" name="last_name" class="form-input text-sm" value="${escapeHtml(inv.last_name || '')}">
              </div>
              <div>
                <label class="form-label">טלפון</label>
                <input type="tel" name="phone" class="form-input ltr text-sm" dir="ltr" placeholder="050-XXX-XXXX" value="${escapeHtml(inv.phone || '')}">
              </div>
              <div>
                <label class="form-label">טלפון נוסף</label>
                <input type="tel" name="phone_secondary" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.phone_secondary || '')}">
              </div>
              <div class="col-span-2">
                <label class="form-label">אימייל</label>
                <input type="email" name="email" class="form-input ltr text-sm" dir="ltr" placeholder="email@example.com" value="${escapeHtml(inv.email || '')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">זיהוי</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">סוג תעודה</label>
                <select name="id_type" class="form-select text-sm">
                  <option value="israeli_id" ${inv.id_type === 'israeli_id' ? 'selected' : ''}>ת.ז.</option>
                  <option value="passport" ${inv.id_type === 'passport' ? 'selected' : ''}>דרכון</option>
                  <option value="other" ${inv.id_type === 'other' ? 'selected' : ''}>אחר</option>
                </select>
              </div>
              <div>
                <label class="form-label">מספר תעודה</label>
                <input type="text" name="id_number" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.id_number || '')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">כתובת</div>
            <div class="grid grid-cols-2 gap-3">
              <div class="col-span-2">
                <label class="form-label">כתובת</label>
                <input type="text" name="address" class="form-input text-sm" value="${escapeHtml(inv.address || '')}">
              </div>
              <div>
                <label class="form-label">עיר</label>
                <input type="text" name="city" class="form-input text-sm" value="${escapeHtml(inv.city || '')}">
              </div>
              <div>
                <label class="form-label">מדינה</label>
                <input type="text" name="country" class="form-input text-sm" value="${escapeHtml(inv.country || 'ישראל')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">פרטים בנקאיים</div>
            <div class="grid grid-cols-3 gap-3">
              <div>
                <label class="form-label">שם בנק</label>
                <input type="text" name="bank_name" class="form-input text-sm" value="${escapeHtml(inv.bank_name || '')}">
              </div>
              <div>
                <label class="form-label">סניף</label>
                <input type="text" name="bank_branch" class="form-input text-sm" value="${escapeHtml(inv.bank_branch || '')}">
              </div>
              <div>
                <label class="form-label">מספר חשבון</label>
                <input type="text" name="bank_account" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.bank_account || '')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">פרטי חברה</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">שם חברה</label>
                <input type="text" name="company_name" class="form-input text-sm" value="${escapeHtml(inv.company_name || '')}">
              </div>
              <div>
                <label class="form-label">ח.פ</label>
                <input type="text" name="company_number" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.company_number || '')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">פרטי LLC</div>
            <div class="grid grid-cols-3 gap-3">
              <div>
                <label class="form-label">שם LLC</label>
                <input type="text" name="llc_name" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.llc_name || '')}">
              </div>
              <div>
                <label class="form-label">EIN</label>
                <input type="text" name="llc_ein" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.llc_ein || '')}">
              </div>
              <div>
                <label class="form-label">ITIN</label>
                <input type="text" name="us_tax_id" class="form-input ltr text-sm" dir="ltr" value="${escapeHtml(inv.us_tax_id || '')}">
              </div>
            </div>

            <div class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 mt-4">ניהול</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">מקור הגעה</label>
                <select name="source" class="form-select text-sm">
                  <option value="">— לא נבחר —</option>
                  <option value="conference" ${inv.source === 'conference' ? 'selected' : ''}>כנס</option>
                  <option value="referral" ${inv.source === 'referral' ? 'selected' : ''}>הפניה</option>
                  <option value="website" ${inv.source === 'website' ? 'selected' : ''}>אתר</option>
                  <option value="facebook" ${inv.source === 'facebook' ? 'selected' : ''}>פייסבוק</option>
                  <option value="linkedin" ${inv.source === 'linkedin' ? 'selected' : ''}>לינקדאין</option>
                  <option value="whatsapp" ${inv.source === 'whatsapp' ? 'selected' : ''}>ווצאפ</option>
                  <option value="other" ${inv.source === 'other' ? 'selected' : ''}>אחר</option>
                </select>
              </div>
              <div>
                <label class="form-label">סטטוס *</label>
                <select name="status" class="form-select text-sm" required>
                  <option value="lead" ${inv.status === 'lead' ? 'selected' : ''}>ליד</option>
                  <option value="active" ${inv.status === 'active' ? 'selected' : ''}>פעיל</option>
                  <option value="inactive" ${inv.status === 'inactive' ? 'selected' : ''}>לא פעיל</option>
                  <option value="vip" ${inv.status === 'vip' ? 'selected' : ''}>VIP</option>
                </select>
              </div>
              <div class="col-span-2">
                <label class="form-label">הערות</label>
                <textarea name="notes" class="form-input text-sm" rows="2">${escapeHtml(inv.notes || '')}</textarea>
              </div>
            </div>

            <div class="branded-modal-actions" style="margin-top: 1.5rem;">
              <button type="submit" class="branded-modal-btn branded-modal-btn-primary">שמור שינויים</button>
              <button type="button" class="branded-modal-btn branded-modal-btn-secondary" data-action="cancel">ביטול</button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('[data-action="cancel"]').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      overlay.querySelector('#investorEditForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'שומר...';

        const body = {};
        const fields = ['first_name','last_name','email','phone','phone_secondary','id_type','id_number',
          'address','city','country','bank_name','bank_branch','bank_account',
          'company_name','company_number','llc_name','llc_ein','us_tax_id','source','status','notes'];
        for (const f of fields) {
          const el = form.elements[f];
          if (el) body[f] = el.value;
        }

        try {
          await API.put(`/investors/${investorId}`, body);
          overlay.remove();
          loadInvestor();
        } catch (err) {
          alert(err.message || 'שגיאה בשמירה');
          btn.disabled = false;
          btn.textContent = 'שמור שינויים';
        }
      });

      requestAnimationFrame(() => overlay.querySelector('[name="first_name"]').focus());
    }

    // ── Portal Access Functions ──
    function populatePortalSection(inv) {
      const usernameEl = document.getElementById('portalUsername');
      const activeEl = document.getElementById('portalActive');
      const statusEl = document.getElementById('portalStatus');
      const lastLoginEl = document.getElementById('lastLoginDisplay');

      if (!usernameEl) return;

      usernameEl.value = inv.portal_username || '';
      activeEl.checked = !!inv.portal_active;

      if (inv.portal_active) {
        statusEl.innerHTML = '<span class="badge badge-green">פעיל</span>';
      } else {
        statusEl.innerHTML = '<span class="badge badge-gray">לא פעיל</span>';
      }

      if (inv.last_login) {
        const d = new Date(inv.last_login);
        const formatted = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' })
          + ' ' + d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
        lastLoginEl.textContent = 'התחברות אחרונה: ' + formatted;
      } else {
        lastLoginEl.textContent = 'טרם התחבר לפורטל';
      }
    }

    function generatePassword() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      let pw = '';
      for (let i = 0; i < 8; i++) {
        pw += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('portalPassword').value = pw;
    }

    async function savePortalAccess() {
      const username = document.getElementById('portalUsername').value.trim();
      const active = document.getElementById('portalActive').checked;
      const password = document.getElementById('portalPassword').value.trim();

      try {
        await API.put(`/investors/${investorId}`, {
          portal_username: username,
          portal_active: active
        });

        if (password) {
          await API.put(`/investors/${investorId}/portal-password`, { password });
        }

        showToast('גישה לפורטל נשמרה בהצלחה');
        document.getElementById('portalPassword').value = '';
        loadInvestor();
      } catch (err) {
        showToast(err.message || 'שגיאה בשמירה', 'error');
      }
    }

    async function resetPortalPassword() {
      generatePassword();
      const password = document.getElementById('portalPassword').value;

      try {
        await API.put(`/investors/${investorId}/portal-password`, { password });
        showToast('סיסמה חדשה: ' + password, 'success');
        document.getElementById('portalPassword').value = '';
        loadInvestor();
      } catch (err) {
        showToast(err.message || 'שגיאה באיפוס סיסמה', 'error');
      }
    }

    // Init
    loadInvestor();
  </script>
</body>
</html>
