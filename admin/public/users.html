<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול משתמשים | Safe Capital Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/tailwind-utilities.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body class="bg-surface min-h-screen font-heebo">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="p-6 border-b border-white/10">
      <a href="/" class="block">
        <img src="/images/logo-half.png" alt="Safe Capital" class="h-8" style="filter: brightness(0) invert(1);" onerror="this.style.display='none'">
      </a>
    </div>
    <nav class="p-3 space-y-1 mt-2">
      <a href="/" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">dashboard</span>
        <span>עסקאות</span>
      </a>
      <a href="/investors" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">groups</span>
        <span>משקיעים</span>
      </a>
      <a href="/users" class="sidebar-link active">
        <span class="material-symbols-outlined text-xl">group</span>
        <span>ניהול משתמשים</span>
      </a>
      <a href="/settings" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">settings</span>
        <span>הגדרות אתר</span>
      </a>

      <div class="sidebar-section-label">תוכן</div>
      <a href="/articles" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">article</span>
        <span>כתבות</span>
      </a>
      <a href="/weekly-briefing" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">summarize</span>
        <span>סקירה שבועית</span>
      </a>
      <a href="/content-pages" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">description</span>
        <span>עמודי מידע</span>
      </a>
      <a href="/content-agents" class="sidebar-link">
        <span class="material-symbols-outlined text-xl">smart_toy</span>
        <span>פרומפטים</span>
      </a>
    </nav>
    <div class="absolute bottom-0 right-0 left-0 p-4 border-t border-white/10">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-medium" id="sidebar-username">--</div>
          <div class="text-xs text-white/50" id="sidebar-role">--</div>
        </div>
        <button onclick="API.logout()" class="text-white/50 hover:text-white transition" title="התנתק">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <button id="sidebarToggle" class="lg:hidden fixed top-4 right-4 z-50 bg-primary text-white p-2 rounded-lg shadow">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <main class="main-content">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">ניהול משתמשים</h1>
        <p class="text-sm text-gray-500 mt-1">יצירה, עריכה ושינוי הרשאות משתמשים</p>
      </div>
      <button class="btn btn-primary" onclick="showAddUserModal()">
        <span class="material-symbols-outlined text-lg">person_add</span>
        משתמש חדש
      </button>
    </div>

    <!-- Users Table -->
    <div class="card overflow-hidden">
      <table class="data-table">
        <thead>
          <tr>
            <th>שם</th>
            <th>אימייל</th>
            <th>תפקיד</th>
            <th>סטטוס</th>
            <th>תאריך הצטרפות</th>
            <th>פעולות</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" class="text-center py-8 text-gray-400">טוען...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit User Modal -->
  <div class="modal-overlay hidden" id="userModal">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold" id="userModalTitle">משתמש חדש</h2>
        <button onclick="closeUserModal()" class="text-gray-400 hover:text-gray-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="userForm" class="space-y-4">
        <input type="hidden" id="userId">
        <div>
          <label class="form-label">שם מלא</label>
          <input type="text" id="userFullName" class="form-input" required>
        </div>
        <div>
          <label class="form-label">אימייל</label>
          <input type="email" id="userEmail" class="form-input ltr" dir="ltr" required>
        </div>
        <div id="passwordField">
          <label class="form-label">סיסמה</label>
          <input type="password" id="userPassword" class="form-input ltr" dir="ltr" minlength="6">
        </div>
        <div>
          <label class="form-label">תפקיד</label>
          <select id="userRole" class="form-select">
            <option value="manager">מנהל/שותף</option>
            <option value="investor">משקיע</option>
          </select>
        </div>
        <div>
          <label class="form-label">טלפון</label>
          <input type="text" id="userPhone" class="form-input ltr" dir="ltr">
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary flex-1" id="userSubmitBtn">צור משתמש</button>
          <button type="button" onclick="closeUserModal()" class="btn btn-secondary">ביטול</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay hidden" id="resetPwModal">
    <div class="modal-box">
      <h2 class="text-xl font-bold mb-6">איפוס סיסמה</h2>
      <form id="resetPwForm" class="space-y-4">
        <input type="hidden" id="resetPwUserId">
        <p class="text-sm text-gray-600" id="resetPwUserName"></p>
        <div>
          <label class="form-label">סיסמה חדשה</label>
          <input type="password" id="resetPwValue" class="form-input ltr" dir="ltr" minlength="6" required>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary flex-1">אפס סיסמה</button>
          <button type="button" onclick="document.getElementById('resetPwModal').classList.add('hidden')" class="btn btn-secondary">ביטול</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>
